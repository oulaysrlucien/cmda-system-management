# Nom de l'application
spring.application.name=cmda-system-management

# Configuration de la base de donnees
spring.datasource.url=jdbc:mysql://localhost:3306/cmda_db
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configurations JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Pagination API R10-E9 : limite les pages trop grandes sur les endpoints Pageable.
spring.data.web.pageable.default-page-size=10
spring.data.web.pageable.max-page-size=100

# Migrations SQL versionnees. Le baseline permet de reprendre la base historique
# sans rejouer la creation initiale des tables deja presentes.
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# Configuration du serveur
server.error.whitelabel.enabled=true

# Configuration de la vue
# R10-E10 : le frontend Angular porte l'interface utilisateur.
# Les vues Thymeleaf de test ont ete retirees du backend.

# Configuration de Swagger
#springdoc.api-docs.path=/v3/api-docs
#springdoc.swagger-ui.path=/swagger-ui.html

# Configuration du logging
logging.file.name=logs/cmda-management.log
logging.level.org.springframework=INFO
logging.level.org.cmda.management=DEBUG
logging.file.path=./logs
logging.file.max-size=10MB
logging.file.max-history=30

# Configuration de la gestion de references circulaires
spring.main.allow-circular-references=true

# Cle secrete pour le JWT
#jwt.secret-key=cmda-secret-key
#jwt.secret-key=VXBkYXRlVGhpcyB3aXRoIHlvdXIgYmFzZTY0IGtleQ==
jwt.secret-key=c29tZXNlY3JldGtleWJhc2U2NGZvcmFwcGxpY2F0aW9u

# Photos membres R8-E5 : fichiers hors base, reference persistante sur cmda_members.
cmda.member-photo.storage-directory=./uploads/member-photos
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Exports membres R10-E9 : plafond MVP pour eviter les exports synchrones trop lourds.
cmda.api.export.max-rows=5000
